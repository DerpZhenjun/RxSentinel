name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Python 单元 + E2E 测试 + 覆盖率
  # ──────────────────────────────────────────────
  test:
    name: pytest – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run test suite (unit + E2E layer 1, skip integration)
        run: |
          pytest tests/ -v --tb=short -m "not integration" \
            --cov=RxServer \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 2: 前端 Vitest 测试
  # ──────────────────────────────────────────────
  frontend:
    name: Vitest – frontend components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: SentinelDashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix SentinelDashboard ci

      - name: Run Vitest
        run: npm --prefix SentinelDashboard test
